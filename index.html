<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Snake Game</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
}

canvas{
    background:#000;
    margin-top:10px;
    border:3px solid lime;
    box-shadow:0 0 20px lime;
}

#scoreboard{
    margin-top:10px;
    font-size:18px;
}

.controls{
    margin-top:20px;
    display:grid;
    grid-template-columns:60px 60px 60px;
    grid-template-rows:60px 60px;
    gap:10px;
}

button{
    font-size:22px;
    background:#222;
    color:white;
    border:2px solid lime;
    border-radius:10px;
}

button:active{
    background:lime;
    color:black;
}
</style>
</head>
<body>

<h2>🐍 Advanced Snake Game</h2>
<div id="scoreboard">
Score: <span id="score">0</span> |
High Score: <span id="highScore">0</span>
</div>

<canvas id="game" width="300" height="300"></canvas>

<div class="controls">
    <div></div>
    <button onclick="changeDirection('UP')">⬆️</button>
    <div></div>
    <button onclick="changeDirection('LEFT')">⬅️</button>
    <button onclick="changeDirection('DOWN')">⬇️</button>
    <button onclick="changeDirection('RIGHT')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 15;
let snake = [{x:150, y:150}];
let direction = "RIGHT";
let food = randomFood();
let score = 0;
let highScore = localStorage.getItem("snakeHighScore") || 0;
document.getElementById("highScore").innerText = highScore;

let speed = 7; // smooth speed
let lastRenderTime = 0;

// Sound Effects
const eatSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const gameOverSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");

function randomFood(){
    return {
        x: Math.floor(Math.random()*20)*box,
        y: Math.floor(Math.random()*20)*box
    };
}

function changeDirection(dir){
    if(dir==="UP" && direction!=="DOWN") direction="UP";
    if(dir==="DOWN" && direction!=="UP") direction="DOWN";
    if(dir==="LEFT" && direction!=="RIGHT") direction="LEFT";
    if(dir==="RIGHT" && direction!=="LEFT") direction="RIGHT";
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp") changeDirection("UP");
    if(e.key==="ArrowDown") changeDirection("DOWN");
    if(e.key==="ArrowLeft") changeDirection("LEFT");
    if(e.key==="ArrowRight") changeDirection("RIGHT");
});

function main(currentTime){
    requestAnimationFrame(main);
    const secondsSinceLastRender = (currentTime - lastRenderTime)/1000;
    if(secondsSinceLastRender < 1/speed) return;
    lastRenderTime = currentTime;
    draw();
}

function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="lime";
    snake.forEach(part=>{
        ctx.fillRect(part.x, part.y, box, box);
    });

    ctx.fillStyle="red";
    ctx.fillRect(food.x, food.y, box, box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction==="UP") headY -= box;
    if(direction==="DOWN") headY += box;
    if(direction==="LEFT") headX -= box;
    if(direction==="RIGHT") headX += box;

    if(headX===food.x && headY===food.y){
        score++;
        eatSound.play();
        speed += 0.3; // increase speed
        document.getElementById("score").innerText=score;
        food = randomFood();
    } else {
        snake.pop();
    }

    let newHead = {x:headX, y:headY};

    if(
        headX<0 || headY<0 ||
        headX>=canvas.width || headY>=canvas.height ||
        collision(newHead, snake)
    ){
        gameOverSound.play();

        if(score > highScore){
            highScore = score;
            localStorage.setItem("snakeHighScore", highScore);
            document.getElementById("highScore").innerText = highScore;
        }

        alert("Game Over! Score: "+score);
        snake=[{x:150,y:150}];
        direction="RIGHT";
        score=0;
        speed=7;
        document.getElementById("score").innerText=0;
    }

    snake.unshift(newHead);
}

function collision(head,array){
    for(let i=0;i<array.length;i++){
        if(head.x===array[i].x && head.y===array[i].y){
            return true;
        }
    }
    return false;
}

requestAnimationFrame(main);
</script>

</body>
</html>
